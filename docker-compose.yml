services:

  postgres:
    image: postgres:13
    container_name: airflow_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data

  airflow-init:
    build: .
    container_name: airflow_init
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      PYTHONPATH: /opt/airflow
      AIRFLOW__CORE__FERNET_KEY: b4MLixpCsLY4-WdDV3FUzLevB4UDbmeHSFW0U46O-L8=
      AIRFLOW__WEBSERVER__SECRET_KEY: brewery_case_secret_key
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./data-lake:/opt/airflow/data-lake
    entrypoint: >
      bash -c "airflow db migrate &&
               airflow users create --username admin --password admin --firstname Romulo --lastname Miranda --role Admin --email romulo@email.com"

  airflow-webserver:
    build: .
    container_name: airflow_webserver
    restart: always
    depends_on:
      - airflow-init
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      PYTHONPATH: /opt/airflow

      # AIRFLOW__CORE__FERNET_KEY: b4MLixpCsLY4-WdDV3FUzLevB4UDbmeHSFW0U46O-L8=
      # AIRFLOW__WEBSERVER__SECRET_KEY: brewery_case_secret_key

      # AIRFLOW__EMAIL__EMAIL_BACKEND: airflow.utils.email.send_email_smtp
      # AIRFLOW__SMTP__SMTP_HOST: smtp.gmail.com
      # AIRFLOW__SMTP__SMTP_STARTTLS: "True"
      # AIRFLOW__SMTP__SMTP_SSL: "False"
      # AIRFLOW__SMTP__SMTP_USER: romuloafm@gmail.com
      # AIRFLOW__SMTP__SMTP_PASSWORD: minhasenha
      # AIRFLOW__SMTP__SMTP_PORT: 587
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./data-lake:/opt/airflow/data-lake
    ports:
      - "8080:8080"
    command: webserver

  airflow-scheduler:
    build: .
    container_name: airflow_scheduler
    restart: always
    depends_on:
      - airflow-webserver
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      PYTHONPATH: /opt/airflow

      # AIRFLOW__CORE__FERNET_KEY: b4MLixpCsLY4-WdDV3FUzLevB4UDbmeHSFW0U46O-L8=
      # AIRFLOW__WEBSERVER__SECRET_KEY: brewery_case_secret_key

      # AIRFLOW__EMAIL__EMAIL_BACKEND: airflow.utils.email.send_email_smtp
      # AIRFLOW__SMTP__SMTP_HOST: smtp.gmail.com
      # AIRFLOW__SMTP__SMTP_STARTTLS: "True"
      # AIRFLOW__SMTP__SMTP_SSL: "False"
      # AIRFLOW__SMTP__SMTP_USER: romuloafm@gmail.com
      # AIRFLOW__SMTP__SMTP_PASSWORD: minhasenha
      # AIRFLOW__SMTP__SMTP_PORT: 587
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./data-lake:/opt/airflow/data-lake
    command: scheduler

volumes:
  postgres-db-volume: